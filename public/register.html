<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="card">
        <h1>Create account</h1>
        <p>Use your email and password to register.</p>
        <form id="register-form">
          <label>Email</label>
          <input type="email" id="email" required placeholder="you@example.com" />
          <label>Password</label>
          <input type="password" id="password" required placeholder="Enter a strong password" />
          <button class="button" type="submit">Register</button>
        </form>
        <p id="message" class="message"></p>
        <div class="footer">
          <a href="/login.html">Already have an account? Login</a>
          <a href="/">Back home</a>
        </div>
      </div>
    </div>
    <script>
      const form = document.getElementById('register-form');
      const message = document.getElementById('message');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        message.textContent = '';

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        if (email.trim().toLowerCase().endsWith('.ru')) {
          message.textContent = 'Registration from .ru email addresses is not allowed.';
          message.className = 'message error';
          return;
        }

        try {
          const response = await fetch('/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
          });

          const data = await response.json();
          if (!response.ok) {
            message.textContent = data.message || 'Registration failed.';
            message.className = 'message error';
            return;
          }

          message.textContent = `Registered successfully as ${data.email}. Redirecting to login...`;
          message.className = 'message success';
          form.reset();
          setTimeout(() => {
            window.location.href = '/login.html';
          }, 1200);
        } catch (error) {
          message.textContent = 'Server error. Try again later.';
          message.className = 'message error';
        }
      });
    </script>
  </body>
</html>
